<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .box {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        form p {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #ff4b5c;
            box-shadow: 0 0 5px rgba(255, 75, 92, 0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff4b5c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #e63946;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 18px;
            text-decoration: none;
            color: #ff4b5c;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .errorlist {
            color: red;
            list-style: none;
            margin-bottom: 10px;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .box {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Create Account</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Register</button>
        </form>

        <a href="{% url 'login' %}">Already have an account? Login</a>
    </div>

</body>
</html>
